<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Comparison of the default and minimal menu templates. Default ships six top-level menus: an App menu (macOS only) with About, Services, Hide, Hide Others, and Quit; File with Close on Mac and Quit elsewhere; Edit with Undo, Redo, Cut, Copy, Paste, and Select All; View with Reload, Force Reload, Reset Zoom, Zoom In, Zoom Out, and Fullscreen; Window with Minimize and Zoom; and Help with Documentation, View Logs, and About. Minimal drops the View and Window menus entirely and trims Edit down to Cut, Copy, Paste, and Select All. The App, File, and Help menus are unchanged between templates.">
  <defs>
    <filter id="mn-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- ========== DEFAULT ========== -->
  <text x="20" y="18" font-size="11" font-weight="600" fill="#1e293b">Default template</text>
  <text x="135" y="18" font-size="10" fill="#94a3b8">six top-level menus, full editing and view controls</text>

  <!-- Menu bar -->
  <g transform="translate(20,28)">
    <rect width="720" height="22" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="60" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">App</text>
    <text x="180" y="15" text-anchor="middle" font-size="10" fill="#475569">File</text>
    <text x="300" y="15" text-anchor="middle" font-size="10" fill="#475569">Edit</text>
    <text x="420" y="15" text-anchor="middle" font-size="10" fill="#475569">View</text>
    <text x="540" y="15" text-anchor="middle" font-size="10" fill="#475569">Window</text>
    <text x="660" y="15" text-anchor="middle" font-size="10" fill="#475569">Help</text>
  </g>

  <!-- Submenus -->
  <!-- App -->
  <g transform="translate(30,56)" filter="url(#mn-shadow)">
    <rect width="100" height="98" rx="4" fill="#fff" stroke="#e2e8f0"/>
    <text x="10" y="16" font-size="9" fill="#1e293b">About</text>
    <line x1="6" y1="22" x2="94" y2="22" stroke="#f1f5f9"/>
    <text x="10" y="34" font-size="9" fill="#1e293b">Services</text>
    <line x1="6" y1="40" x2="94" y2="40" stroke="#f1f5f9"/>
    <text x="10" y="52" font-size="9" fill="#1e293b">Hide</text>
    <text x="10" y="64" font-size="9" fill="#1e293b">Hide Others</text>
    <line x1="6" y1="70" x2="94" y2="70" stroke="#f1f5f9"/>
    <text x="10" y="82" font-size="9" fill="#1e293b">Quit</text>
    <text x="10" y="94" font-size="7" fill="#94a3b8">macOS only</text>
  </g>

  <!-- File -->
  <g transform="translate(150,56)" filter="url(#mn-shadow)">
    <rect width="100" height="98" rx="4" fill="#fff" stroke="#e2e8f0"/>
    <text x="10" y="16" font-size="9" fill="#1e293b">Close</text>
    <text x="10" y="28" font-size="7" fill="#94a3b8">macOS</text>
    <text x="10" y="46" font-size="9" fill="#1e293b">Quit</text>
    <text x="10" y="58" font-size="7" fill="#94a3b8">Windows / Linux</text>
  </g>

  <!-- Edit (full) -->
  <g transform="translate(270,56)" filter="url(#mn-shadow)">
    <rect width="100" height="98" rx="4" fill="#fff" stroke="#e2e8f0"/>
    <text x="10" y="16" font-size="9" fill="#1e293b">Undo</text>
    <text x="10" y="28" font-size="9" fill="#1e293b">Redo</text>
    <line x1="6" y1="34" x2="94" y2="34" stroke="#f1f5f9"/>
    <text x="10" y="46" font-size="9" fill="#1e293b">Cut</text>
    <text x="10" y="58" font-size="9" fill="#1e293b">Copy</text>
    <text x="10" y="70" font-size="9" fill="#1e293b">Paste</text>
    <text x="10" y="82" font-size="9" fill="#1e293b">Select All</text>
  </g>

  <!-- View -->
  <g transform="translate(390,56)" filter="url(#mn-shadow)">
    <rect width="100" height="98" rx="4" fill="#fff" stroke="#e2e8f0"/>
    <text x="10" y="16" font-size="9" fill="#1e293b">Reload</text>
    <text x="10" y="28" font-size="9" fill="#1e293b">Force Reload</text>
    <line x1="6" y1="34" x2="94" y2="34" stroke="#f1f5f9"/>
    <text x="10" y="46" font-size="9" fill="#1e293b">Reset Zoom</text>
    <text x="10" y="58" font-size="9" fill="#1e293b">Zoom In</text>
    <text x="10" y="70" font-size="9" fill="#1e293b">Zoom Out</text>
    <line x1="6" y1="76" x2="94" y2="76" stroke="#f1f5f9"/>
    <text x="10" y="88" font-size="9" fill="#1e293b">Fullscreen</text>
  </g>

  <!-- Window -->
  <g transform="translate(510,56)" filter="url(#mn-shadow)">
    <rect width="100" height="98" rx="4" fill="#fff" stroke="#e2e8f0"/>
    <text x="10" y="16" font-size="9" fill="#1e293b">Minimize</text>
    <text x="10" y="28" font-size="9" fill="#1e293b">Zoom</text>
  </g>

  <!-- Help -->
  <g transform="translate(630,56)" filter="url(#mn-shadow)">
    <rect width="100" height="98" rx="4" fill="#fff" stroke="#e2e8f0"/>
    <text x="10" y="16" font-size="9" fill="#1e293b">Documentation</text>
    <text x="10" y="28" font-size="7" fill="#94a3b8">when help_url set</text>
    <text x="10" y="46" font-size="9" fill="#1e293b">View Logs</text>
    <line x1="6" y1="52" x2="94" y2="52" stroke="#f1f5f9"/>
    <text x="10" y="64" font-size="9" fill="#1e293b">About</text>
  </g>

  <!-- Divider -->
  <line x1="20" y1="180" x2="740" y2="180" stroke="#e2e8f0" stroke-dasharray="3,3"/>

  <!-- ========== MINIMAL ========== -->
  <text x="20" y="200" font-size="11" font-weight="600" fill="#1e293b">Minimal template</text>
  <text x="135" y="200" font-size="10" fill="#94a3b8">View and Window dropped, Edit trimmed to clipboard verbs</text>

  <!-- Menu bar -->
  <g transform="translate(20,210)">
    <rect width="720" height="22" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="60" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">App</text>
    <text x="180" y="15" text-anchor="middle" font-size="10" fill="#475569">File</text>
    <text x="300" y="15" text-anchor="middle" font-size="10" fill="#475569">Edit</text>
    <text x="660" y="15" text-anchor="middle" font-size="10" fill="#475569">Help</text>
  </g>

  <!-- Submenus -->
  <!-- App (reduced) -->
  <g transform="translate(30,238)" filter="url(#mn-shadow)">
    <rect width="100" height="98" rx="4" fill="#fff" stroke="#e2e8f0"/>
    <text x="10" y="16" font-size="9" fill="#1e293b">About</text>
    <line x1="6" y1="22" x2="94" y2="22" stroke="#f1f5f9"/>
    <text x="10" y="34" font-size="9" fill="#1e293b">Quit</text>
    <text x="10" y="48" font-size="7" fill="#94a3b8">macOS only</text>
  </g>

  <!-- File -->
  <g transform="translate(150,238)" filter="url(#mn-shadow)">
    <rect width="100" height="98" rx="4" fill="#fff" stroke="#e2e8f0"/>
    <text x="10" y="16" font-size="9" fill="#1e293b">Close</text>
    <text x="10" y="28" font-size="7" fill="#94a3b8">macOS</text>
    <text x="10" y="46" font-size="9" fill="#1e293b">Quit</text>
    <text x="10" y="58" font-size="7" fill="#94a3b8">Windows / Linux</text>
  </g>

  <!-- Edit (trimmed) -->
  <g transform="translate(270,238)" filter="url(#mn-shadow)">
    <rect width="100" height="98" rx="4" fill="#fff" stroke="#e2e8f0"/>
    <text x="10" y="16" font-size="9" fill="#1e293b">Cut</text>
    <text x="10" y="28" font-size="9" fill="#1e293b">Copy</text>
    <text x="10" y="40" font-size="9" fill="#1e293b">Paste</text>
    <text x="10" y="52" font-size="9" fill="#1e293b">Select All</text>
  </g>

  <!-- View (removed) -->
  <g transform="translate(390,238)" opacity="0.35">
    <rect width="100" height="98" rx="4" fill="#fff" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="50" y="42" text-anchor="middle" font-size="10" fill="#94a3b8">View</text>
    <text x="50" y="60" text-anchor="middle" font-size="9" fill="#94a3b8">removed</text>
  </g>

  <!-- Window (removed) -->
  <g transform="translate(510,238)" opacity="0.35">
    <rect width="100" height="98" rx="4" fill="#fff" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="50" y="42" text-anchor="middle" font-size="10" fill="#94a3b8">Window</text>
    <text x="50" y="60" text-anchor="middle" font-size="9" fill="#94a3b8">removed</text>
  </g>

  <!-- Help (same) -->
  <g transform="translate(630,238)" filter="url(#mn-shadow)">
    <rect width="100" height="98" rx="4" fill="#fff" stroke="#e2e8f0"/>
    <text x="10" y="16" font-size="9" fill="#1e293b">Documentation</text>
    <text x="10" y="28" font-size="7" fill="#94a3b8">when help_url set</text>
    <text x="10" y="46" font-size="9" fill="#1e293b">View Logs</text>
    <line x1="6" y1="52" x2="94" y2="52" stroke="#f1f5f9"/>
    <text x="10" y="64" font-size="9" fill="#1e293b">About</text>
  </g>

  <!-- Caption -->
  <text x="380" y="354" text-anchor="middle" font-size="9" fill="#94a3b8">DevTools adds to View when menu.show_dev_tools is true.</text>
</svg>
