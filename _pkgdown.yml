url: https://r-pkg.thecoatlessprofessor.com/shinyelectron/

template:
  bootstrap: 5

navbar:
  structure:
    left: [intro, articles, reference, news]
    right: [search, github]
  components:
    intro:
      text: Get Started
      href: articles/getting-started.html
    articles:
      text: Articles
      menu:
        - text: "Basics"
        - text: Getting Started
          href: articles/getting-started.html
        - text: Configuration Guide
          href: articles/configuration.html
        - text: Runtime Strategies
          href: articles/runtime-strategies.html
        - text: "---"
        - text: "Building & Distribution"
        - text: Code Signing
          href: articles/code-signing.html
        - text: Automatic Updates
          href: articles/auto-updates.html
        - text: Building with GitHub Actions
          href: articles/github-actions.html
        - text: "---"
        - text: "Advanced Topics"
        - text: Multi-App Suites
          href: articles/multi-app-suites.html
        - text: Container Strategy
          href: articles/container-strategy.html
        - text: Security Considerations
          href: articles/security.html
        - text: Customizations
          href: articles/customizations.html
        - text: "---"
        - text: "Reference"
        - text: Node.js Management
          href: articles/nodejs-management.html
        - text: Troubleshooting
          href: articles/troubleshooting.html

articles:
  - title: "Basics"
    navbar: ~
    contents:
      - getting-started
      - configuration
      - runtime-strategies

  - title: "Building & Distribution"
    contents:
      - code-signing
      - auto-updates
      - github-actions

  - title: "Advanced Topics"
    contents:
      - multi-app-suites
      - container-strategy
      - security
      - customizations

  - title: "Reference"
    contents:
      - nodejs-management
      - troubleshooting

reference:
  - title: "Export & Build"
    desc: "Main functions for exporting Shiny apps as Electron desktop applications"
    contents:
      - export
      - build_electron_app
      - run_electron_app

  - title: "Conversion"
    desc: "Convert Shiny apps to shinylive format"
    contents:
      - convert_shiny_to_shinylive
      - convert_py_to_shinylive

  - title: "Runtime Management"
    desc: "Install and manage R, Python, and Node.js runtimes"
    contents:
      - install_r
      - install_python
      - install_nodejs

  - title: "Configuration"
    desc: "Configure shinyelectron projects"
    contents:
      - init_config
      - show_config
      - wizard
      - enable_auto_updates
      - disable_auto_updates
      - check_auto_update_status

  - title: "Developer Tools"
    desc: "Pre-flight checks, examples, and diagnostics"
    contents:
      - app_check
      - available_examples
      - example_app

  - title: "Diagnostics"
    desc: "Check system requirements and troubleshoot issues"
    contents:
      - sitrep_shinyelectron
      - sitrep_electron_system
      - sitrep_electron_dependencies
      - sitrep_electron_build_tools
      - sitrep_electron_project

  - title: "Cache Management"
    desc: "Inspect, manage, and clear cached runtimes and assets"
    contents:
      - cache_info
      - cache_dir
      - cache_remove
      - cache_clear
