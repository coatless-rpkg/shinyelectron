<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="Three tray button configurations side by side. Default: minimize_to_tray true, close_to_tray false; the Minimize button hides the window to the tray and the Close button quits the app. Hide both: minimize_to_tray true, close_to_tray true; both Minimize and Close hide the window to the tray. Close only: minimize_to_tray false, close_to_tray true; Minimize sends the window to the taskbar normally and Close hides the window to the tray. Each column shows the two config values, then two coloured arrows pointing from Minimize and Close labels to their destination chips: blue for Tray, red for Quit, gray for Taskbar.">
  <defs>
    <marker id="tb-arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
    <marker id="tb-arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
    <marker id="tb-arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <text x="140" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1.2">DEFAULT</text>
  <text x="380" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1.2">HIDE BOTH</text>
  <text x="620" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1.2">CLOSE ONLY</text>

  <!-- ==================== Column 1: minimize=true, close=false (default) ==================== -->
  <g transform="translate(40,40)">
    <!-- Config -->
    <rect width="200" height="56" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="14" y="22" font-size="10" fill="#64748b">minimize_to_tray:</text>
    <text x="146" y="22" font-size="10" font-weight="600" fill="#1e293b">true</text>
    <text x="14" y="42" font-size="10" fill="#64748b">close_to_tray:</text>
    <text x="146" y="42" font-size="10" font-weight="600" fill="#1e293b">false</text>

    <!-- Minimize -> Tray -->
    <text x="0" y="100" font-size="11" font-weight="600" fill="#3b82f6">Minimize</text>
    <line x1="60" y1="96" x2="118" y2="96" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#tb-arrow-blue)"/>
    <g transform="translate(126,84)">
      <rect width="74" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
      <text x="37" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Tray</text>
    </g>

    <!-- Close -> Quit -->
    <text x="0" y="148" font-size="11" font-weight="600" fill="#ef4444">Close</text>
    <line x1="60" y1="144" x2="118" y2="144" stroke="#ef4444" stroke-width="1.5" marker-end="url(#tb-arrow-red)"/>
    <g transform="translate(126,132)">
      <rect width="74" height="22" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
      <text x="37" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">Quit</text>
    </g>
  </g>

  <!-- ==================== Column 2: minimize=true, close=true ==================== -->
  <g transform="translate(280,40)">
    <rect width="200" height="56" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="14" y="22" font-size="10" fill="#64748b">minimize_to_tray:</text>
    <text x="146" y="22" font-size="10" font-weight="600" fill="#1e293b">true</text>
    <text x="14" y="42" font-size="10" fill="#64748b">close_to_tray:</text>
    <text x="146" y="42" font-size="10" font-weight="600" fill="#1e293b">true</text>

    <text x="0" y="100" font-size="11" font-weight="600" fill="#3b82f6">Minimize</text>
    <line x1="60" y1="96" x2="118" y2="96" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#tb-arrow-blue)"/>
    <g transform="translate(126,84)">
      <rect width="74" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
      <text x="37" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Tray</text>
    </g>

    <text x="0" y="148" font-size="11" font-weight="600" fill="#3b82f6">Close</text>
    <line x1="60" y1="144" x2="118" y2="144" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#tb-arrow-blue)"/>
    <g transform="translate(126,132)">
      <rect width="74" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
      <text x="37" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Tray</text>
    </g>
  </g>

  <!-- ==================== Column 3: minimize=false, close=true ==================== -->
  <g transform="translate(520,40)">
    <rect width="200" height="56" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="14" y="22" font-size="10" fill="#64748b">minimize_to_tray:</text>
    <text x="146" y="22" font-size="10" font-weight="600" fill="#1e293b">false</text>
    <text x="14" y="42" font-size="10" fill="#64748b">close_to_tray:</text>
    <text x="146" y="42" font-size="10" font-weight="600" fill="#1e293b">true</text>

    <text x="0" y="100" font-size="11" font-weight="600" fill="#94a3b8">Minimize</text>
    <line x1="60" y1="96" x2="118" y2="96" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#tb-arrow-gray)"/>
    <g transform="translate(126,84)">
      <rect width="74" height="22" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
      <text x="37" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Taskbar</text>
    </g>

    <text x="0" y="148" font-size="11" font-weight="600" fill="#3b82f6">Close</text>
    <line x1="60" y1="144" x2="118" y2="144" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#tb-arrow-blue)"/>
    <g transform="translate(126,132)">
      <rect width="74" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
      <text x="37" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Tray</text>
    </g>
  </g>

  <!-- Caption -->
  <text x="380" y="208" text-anchor="middle" font-size="10" fill="#475569">The two toggles set where each window button sends the window.</text>
  <text x="380" y="222" text-anchor="middle" font-size="9" fill="#94a3b8">tray.enabled must be true for any "Tray" routing to work.</text>
</svg>
