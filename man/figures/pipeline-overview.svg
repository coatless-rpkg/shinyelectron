<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="200" fill="url(#g1)" rx="12"/>

  <!-- Step 1: Shiny App -->
  <g transform="translate(60,40)" filter="url(#shadow)">
    <rect width="150" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect width="150" height="4" rx="2" fill="#3b82f6" y="0"/>
    <text x="75" y="45" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Shiny App</text>
    <text x="75" y="68" text-anchor="middle" font-size="11" fill="#64748b">app.R</text>
    <text x="75" y="84" text-anchor="middle" font-size="11" fill="#64748b">or app.py</text>
    <text x="75" y="108" text-anchor="middle" font-size="10" fill="#94a3b8">R | Python</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(225,88)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="50,-5 60,0 50,5" fill="#94a3b8"/>
    <text x="30" y="-10" text-anchor="middle" font-size="9" fill="#94a3b8">export()</text>
  </g>

  <!-- Step 2: shinyelectron -->
  <g transform="translate(300,40)" filter="url(#shadow)">
    <rect width="180" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect width="180" height="4" rx="2" fill="#8b5cf6" y="0"/>
    <text x="90" y="38" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">shinyelectron</text>
    <text x="90" y="60" text-anchor="middle" font-size="10" fill="#64748b">Convert + Package</text>
    <line x1="20" y1="72" x2="160" y2="72" stroke="#f1f5f9" stroke-width="1"/>
    <text x="90" y="90" text-anchor="middle" font-size="10" fill="#94a3b8">shinylive | native</text>
    <text x="90" y="106" text-anchor="middle" font-size="10" fill="#94a3b8">electron-builder</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(495,88)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="50,-5 60,0 50,5" fill="#94a3b8"/>
  </g>

  <!-- Step 3: Desktop App -->
  <g transform="translate(570,40)" filter="url(#shadow)">
    <rect width="170" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect width="170" height="4" rx="2" fill="#10b981" y="0"/>
    <text x="85" y="38" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Desktop App</text>
    <!-- Mini window chrome -->
    <g transform="translate(35,50)">
      <rect width="100" height="60" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
      <rect width="100" height="12" rx="4" fill="#f1f5f9"/>
      <circle cx="8" cy="6" r="2.5" fill="#f87171"/>
      <circle cx="16" cy="6" r="2.5" fill="#fbbf24"/>
      <circle cx="24" cy="6" r="2.5" fill="#34d399"/>
      <rect x="8" y="20" width="35" height="4" rx="1" fill="#e2e8f0"/>
      <rect x="8" y="28" width="84" height="3" rx="1" fill="#e2e8f0"/>
      <rect x="8" y="35" width="60" height="3" rx="1" fill="#e2e8f0"/>
      <rect x="8" y="44" width="40" height="8" rx="2" fill="#3b82f6" opacity="0.2"/>
    </g>
    <text x="85" y="126" text-anchor="middle" font-size="10" fill="#94a3b8">.app | .exe | AppImage</text>
  </g>
</svg>
